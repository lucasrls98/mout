name: Cypress Tests
on: [push, pull_request]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Executar testes Cypress
        uses: cypress-io/github-action@v6
        with:
          build: npm install
          command: npx cypress run